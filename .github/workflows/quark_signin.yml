name: Quark签到

on:
  schedule:
    - cron: '5 0 * * *' # 北京时间 08:05 (UTC+8 -> UTC+1)
    - cron: '0 5 * * *' # 北京时间 13:00 (UTC+8 -> UTC+5)
  workflow_dispatch: # 允许手动触发

jobs:
  check-if-already-signed:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: 获取当前日期并检查变量
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_date=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "当前北京时间: $current_date"
          
          # 尝试读取仓库变量 LAST_CHECKIN_DATE (如果不存在则为空)
          last_date=$(gh variable get LAST_CHECKIN_DATE 2>/dev/null || echo "")
          echo "上次签到日期: $last_date"
          
          if [ "$last_date" = "$current_date" ]; then
            echo "今天已成功签到，跳过执行。"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "今天尚未签到，继续执行。"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

  sign-in:
    needs: check-if-already-signed
    if: needs.check-if-already-signed.outputs.skip == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 随机延迟（早上）
        if: github.event.schedule == '0 1 * * *'
        run: |
          delay=$((RANDOM % 60))
          echo "早上签到，延迟 $delay 秒后开始.."
          sleep $delay

      - name: 随机延迟（下午/手动触发）
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          delay=$((RANDOM % 30))
          echo "下午兜底或手动触发，延迟 $delay 秒后开始.."
          sleep $delay

      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install requests

      - name: 执行签到脚本
        env:
          QUARK_PR: ${{ vars.QUARK_PR }}
          QUARK_FR: ${{ vars.QUARK_FR }}
          COOKIE_QUARK: ${{ secrets.COOKIE_QUARK }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          SERVER_KEY: ${{ secrets.SERVER_KEY }}
        run: python checkIn_Quark.py

      - name: 更新签到日期到仓库变量
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          date_str=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          # 使用 gh 命令设置/更新变量
          gh variable set LAST_CHECKIN_DATE --body "$date_str"
          echo "已更新签到时间 为: $date_str"

      - name: 清理旧的工作流记录
        uses: Mattraks/delete-workflow-runs@main
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 60
